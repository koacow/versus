{% extends 'base.html' %}
{% block title %}Login — VERSUS{% endblock %}
{% block content %}

<div class="vs-form-card">
  <h2>Login</h2>
  {% if error %}
    <div class="error-msg">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login">
    <div class="vs-field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username">
    </div>
    <div class="vs-field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="vs-btn vs-btn--primary vs-btn--full" style="margin-top:.5rem">Login</button>
  </form>
  <p style="margin-top:1.25rem;font-size:.85rem;text-align:center">
    No account? <a href="/register">Register</a>
  </p>
</div>

{% endblock %}
